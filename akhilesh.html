<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akhilesh Saini | Ultra Animated Profile</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
font-family: 'Poppins', sans-serif;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* Animated Background */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background: radial-gradient(circle at center, #00ff6a33 0%, #000 60%);
animation: rotateBG 25s linear infinite;
z-index:-1;
}

@keyframes rotateBG{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

nav{
position:fixed;
width:100%;
padding:20px;
text-align:center;
background:#000000cc;
backdrop-filter:blur(10px);
z-index:1000;
}

nav a{
color:#00ff6a;
margin:0 20px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

nav a:hover{
color:white;
text-shadow:0 0 10px #00ff6a;
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
text-align:center;
}

h1{
font-size:60px;
color:#00ff6a;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #00ff6a;}
to{text-shadow:0 0 30px #00ff6a;}
}

.card{
background:#111;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px #00ff6a33;
margin:20px;
transition:.5s;
width:90%;
max-width:600px;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 0 40px #00ff6a;
}

.bike{
font-size:80px;
animation: moveBike 4s infinite linear;
}

@keyframes moveBike{
0%{transform:translateX(-200px);}
50%{transform:translateX(200px);}
100%{transform:translateX(-200px);}
}

.ball{
font-size:70px;
animation: bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-40px);}
}

.cook{
font-size:70px;
animation: rotate 4s infinite linear;
}

@keyframes rotate{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.fade{
opacity:0;
transform:translateY(50px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

/* Instagram Button */
.insta-btn{
display:inline-block;
margin-top:20px;
padding:15px 30px;
background:linear-gradient(45deg,#ff00cc,#00ff6a);
border-radius:50px;
color:white;
font-weight:bold;
text-decoration:none;
transition:.4s;
box-shadow:0 0 20px #00ff6a;
}

.insta-btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px #00ff6a, 0
